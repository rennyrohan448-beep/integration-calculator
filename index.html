<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Integration Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fb;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 900px;
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .container {
                grid-template-columns: 350px 1fr;
            }
        }
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafafa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e1e4e8;
        }
        h2 {
            margin-top: 0;
            color: #1a1a1a;
            font-size: 1.4rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #666;
        }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #0076ff;
            outline: none;
        }
        .bounds-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .result-box {
            margin-top: 10px;
            padding: 14px;
            background: #eef5ff;
            border-left: 4px solid #0076ff;
            border-radius: 0 6px 6px 0;
        }
        .result-title {
            font-size: 0.85rem;
            color: #0056b3;
            font-weight: bold;
            text-transform: uppercase;
        }
        .result-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #111;
            margin-top: 4px;
        }
        .error {
            color: #dc3545;
            background: #fde8e8;
            border-left: 4px solid #dc3545;
            padding: 10px;
            font-size: 0.9rem;
            border-radius: 0 6px 6px 0;
            display: none;
        }
        .graph-container {
            position: relative;
            min-height: 300px;
            width: 100%;
            background: #fff;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>Integration Tool</h2>
        
        <div class="input-group">
            <label for="functionInput">Function f(x)</label>
            <input type="text" id="functionInput" value="x^2 - 2x" placeholder="e.g., x^2, sin(x), exp(x)">
        </div>
        
        <div class="bounds-group">
            <div class="input-group">
                <label for="lowerBound">Lower Bound (a)</label>
                <input type="number" id="lowerBound" value="0" step="any">
            </div>
            <div class="input-group">
                <label for="upperBound">Upper Bound (b)</label>
                <input type="number" id="upperBound" value="3" step="any">
            </div>
        </div>

        <div id="errorBox" class="error"></div>

        <div class="result-box">
            <div class="result-title">Definite Integral Value</div>
            <div id="resultValue" class="result-value">0.0000</div>
        </div>
    </div>

    <div class="graph-container">
        <canvas id="myChart"></canvas>
    </div>
</div>

<script>
    let chart;
    const ctx = document.getElementById('myChart').getContext('2d');

    // DOM Elements
    const functionInput = document.getElementById('functionInput');
    const lowerBoundInput = document.getElementById('lowerBound');
    const upperBoundInput = document.getElementById('upperBound');
    const resultValue = document.getElementById('resultValue');
    const errorBox = document.getElementById('errorBox');

    // Numeric Integration using Simpson's Rule
    function simpsonsRule(f, a, b, n = 1000) {
        if (n % 2 !== 0) n++; // n must be even
        const h = (b - a) / n;
        let sum = f(a) + f(b);

        for (let i = 1; i < n; i++) {
            const x = a + i * h;
            sum += i % 2 === 0 ? 2 * f(x) : 4 * f(x);
        }
        return (h / 3) * sum;
    }

    // Main calculation and update cycle
    function updateCalculator() {
        errorBox.style.display = 'none';
        const exprString = functionInput.value;
        const a = parseFloat(lowerBoundInput.value);
        const b = parseFloat(upperBoundInput.value);

        if (isNaN(a) || isNaN(b)) {
            showError("Please enter valid numbers for bounds.");
            return;
        }

        try {
            // Compile user input function securely using math.js
            const compiledExpr = math.compile(exprString);
            const f = (x) => compiledExpr.evaluate({ x: x });

            // Test if function evaluates properly
            f(a);

            // Calculate numeric integral
            const integralResult = simpsonsRule(f, a, b);
            resultValue.textContent = isNaN(integralResult) ? "Undefined" : integralResult.toFixed(4);

            // Generate graph data bounds (pad the view a bit wider than [a, b])
            const padding = Math.max(Math.abs(b - a) * 0.5, 2);
            const viewMin = Math.min(a, b) - padding;
            const viewMax = Math.max(a, b) + padding;
            
            const steps = 200;
            const stepSize = (viewMax - viewMin) / steps;

            const lineData = [];
            const fillData = [];

            for (let i = 0; i <= steps; i++) {
                const x = viewMin + i * stepSize;
                let y;
                try {
                    y = f(x);
                } catch(e) {
                    y = null;
                }

                if (typeof y === 'number' && !isNaN(y) && isFinite(y)) {
                    lineData.push({ x: x, y: y });
                    
                    // Populate data for the filled/shaded integration area
                    if (a <= b ? (x >= a && x <= b) : (x >= b && x <= a)) {
                        fillData.push({ x: x, y: y });
                    }
                }
            }

            // Update Chart.js Graphic
            updateChart(lineData, fillData, a, b);

        } catch (err) {
            showError("Invalid expression syntax or evaluation error.");
            resultValue.textContent = "Error";
        }
    }

    function showError(msg) {
        errorBox.textContent = msg;
        errorBox.style.display = 'block';
    }

    function updateChart(lineData, fillData, a, b) {
        if (chart) {
            chart.destroy();
        }

        chart = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [
                    {
                        label: 'f(x)',
                        data: lineData,
                        showLine: true,
                        borderColor: '#0076ff',
                        borderWidth: 2.5,
                        pointRadius: 0,
                        fill: false
                    },
                    {
                        label: 'Integrated Area',
                        data: fillData,
                        showLine: true,
                        borderColor: 'transparent',
                        pointRadius: 0,
                        fill: 'origin', // Fills area to the x-axis
                        backgroundColor: 'rgba(0, 118, 255, 0.2)',
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        type: 'linear',
                        position: 'bottom',
                        grid: { color: '#e1e4e8' },
                        title: { display: true, text: 'x' }
                    },
                    y: {
                        type: 'linear',
                        grid: { color: '#e1e4e8' },
                        title: { display: true, text: 'y' }
                    }
                }
            }
        });
    }

    // Attach real-time event listeners
    functionInput.addEventListener('input', updateCalculator);
    lowerBoundInput.addEventListener('input', updateCalculator);
    upperBoundInput.addEventListener('input', updateCalculator);

    // Initial load
    updateCalculator();
</script>

</body>
</html>
